<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/style.css">
<title>Add Course</title>
</head>

<body class="courses-page">

<div class="nav">
<a href="/dashboard">Dashboard</a>
<a href="/courses-page">Courses</a>
<a href="/logout">Logout</a>
</div>

<div class="page">

<h1>Add New Course</h1>

<div class="card">

<form action="/save-course" method="post">

<input type="text" name="title" placeholder="Course Title" required><br><br>

<input type="text" name="description" placeholder="Course Description" required><br><br>

<input type="text" name="videoUrl"
placeholder="YouTube Embed Link (https://www.youtube.com/embed/...)" required><br><br>

<button type="submit">Save Course</button>

</form>

</div>

</div>

</body>
</html>
